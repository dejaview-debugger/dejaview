version: 2.1

jobs:
  test:
    docker:
    - image: ghcr.io/astral-sh/uv:0.5-python3.12-bookworm-slim
    working_directory: ~/project
    environment:
      UV_CACHE_DIR: .uv-cache
    steps:
    - add_ssh_keys:
        fingerprints:
        - "e8:f4:a7:f1:4e:ca:e9:e7:f9:c4:9b:0c:a2:52:4b:41"
    - run:
        name: Install git/ssh client and build tools
        command: |
          apt-get update
          apt-get install -y git openssh-client gcc curl
    - run:
        name: Trust git.uwaterloo.ca host key
        command: |
          mkdir -p ~/.ssh
          ssh-keyscan git.uwaterloo.ca >> ~/.ssh/known_hosts
    - checkout
    - run:
        name: Ensure cache directory
        command: mkdir -p "$UV_CACHE_DIR"
    - restore_cache:
        keys:
        - v1-uv-cache-{{ checksum "uv.lock" }}
        - v1-uv-cache-
    - run:
        name: Install dependencies
        command: uv sync --dev
    - save_cache:
        key: v1-uv-cache-{{ checksum "uv.lock" }}
        paths:
        - .uv-cache
    - run:
        name: Ruff Check
        command: uv run ruff check
    - run:
        name: Ruff Format
        command: uv run ruff format --diff
    - run:
        name: Mypy
        command: uv run mypy dejaview
    - run:
        name: Run pytest
        command: uv run pytest -n 8 --dist=loadgroup
    - run:
        name: Install Node.js, npm, and Xvfb
        command: |
          apt-get update && \
          apt-get install -y nodejs npm xvfb libgtk-3-0 libxss1 libasound2 libnss3 libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 libxi6 libxtst6 libxrandr2 libxkbcommon0 libxshmfence1 libgbm1 libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libatspi2.0-0 libdrm2 libxinerama1 libxss1 libxext6 libxfixes3
    - run:
        name: Run VSCode Extension Tests (headless)
        command: |
          cd dejaview-extension
          npm install
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' npm test
    - run:
        name: Prune UV cache
        when: always
        command: uv cache prune --ci

workflows:
  test:
    jobs:
    - test
